<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- background pill -->
  <rect width="512" height="512" rx="108" fill="#c4775a"/>

  <!-- soft inner glow -->
  <rect width="512" height="512" rx="108" fill="url(#glow)" opacity="0.35"/>
  <defs>
    <radialGradient id="glow" cx="50%" cy="38%" r="52%">
      <stop offset="0%" stop-color="#fffdf9" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c4775a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Left blob (blush/cream) -->
  <g transform="translate(162,236)">
    <path d="M0,-76 C46,-76 80,-38 80,4 C80,50 46,80 0,80 C-46,80 -80,50 -80,4 C-80,-38 -46,-76 0,-76Z" fill="#e8c5b0"/>
    <ellipse cx="-38" cy="20" rx="17" ry="12" fill="#f5a490" opacity="0.55"/>
    <ellipse cx="38"  cy="20" rx="17" ry="12" fill="#f5a490" opacity="0.55"/>
    <circle cx="-24" cy="-8" r="15" fill="white"/>
    <circle cx="24"  cy="-8" r="15" fill="white"/>
    <circle cx="-22" cy="-6" r="8"  fill="#3a2a1a"/>
    <circle cx="26"  cy="-6" r="8"  fill="#3a2a1a"/>
    <circle cx="-18" cy="-10" r="3.5" fill="white"/>
    <circle cx="30"  cy="-10" r="3.5" fill="white"/>
    <path d="M-18,29 Q0,42 18,29" stroke="#5a3a28" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.35"/>
  </g>

  <!-- Right blob (terracotta) -->
  <g transform="translate(350,236)">
    <path d="M0,-76 C46,-76 80,-38 80,4 C80,50 46,80 0,80 C-46,80 -80,50 -80,4 C-80,-38 -46,-76 0,-76Z" fill="#9e5c42"/>
    <ellipse cx="-38" cy="20" rx="17" ry="12" fill="#e8907a" opacity="0.55"/>
    <ellipse cx="38"  cy="20" rx="17" ry="12" fill="#e8907a" opacity="0.55"/>
    <circle cx="-24" cy="-8" r="15" fill="white"/>
    <circle cx="24"  cy="-8" r="15" fill="white"/>
    <circle cx="-22" cy="-6" r="8"  fill="#3a2a1a"/>
    <circle cx="26"  cy="-6" r="8"  fill="#3a2a1a"/>
    <circle cx="-18" cy="-10" r="3.5" fill="white"/>
    <circle cx="30"  cy="-10" r="3.5" fill="white"/>
    <path d="M-18,29 Q0,42 18,29" stroke="#5a3a28" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.35"/>
  </g>

  <!-- Nest base arc -->
  <path d="M96,380 Q256,460 416,380" stroke="#7a4530" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M116,395 Q256,470 396,395" stroke="#7a4530" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.3"/>
