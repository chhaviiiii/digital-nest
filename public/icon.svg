<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#fdf3ed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background: soft warm cream, rounded square -->
  <rect width="512" height="512" rx="112" fill="#fdf3ed"/>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Left heart (warm brown / terracotta) -->
  <path
    transform="translate(193, 262)"
    d="M 0 85
       C -7 72, -95 35, -95 -22
       C -95 -77, -48 -102, 0 -64
       C 48 -102, 95 -77, 95 -22
       C 95 35, 7 72, 0 85 Z"
    fill="#a35430"/>

  <!-- Right heart (soft pink) — rendered on top at the overlap -->
  <path
    transform="translate(323, 262)"
    d="M 0 85
       C -7 72, -95 35, -95 -22
       C -95 -77, -48 -102, 0 -64
       C 48 -102, 95 -77, 95 -22
       C 95 35, 7 72, 0 85 Z"
    fill="#f0b4be"/>
</svg>
